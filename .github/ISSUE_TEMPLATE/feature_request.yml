name: Feature request
description: Suggest an improvement for AI Agent Swarm.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow or limitation should this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the change and expected behavior.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundaries
      options:
        - label: This request does not require exposing secrets, `.env` values, private logs, or production data.
          required: true
