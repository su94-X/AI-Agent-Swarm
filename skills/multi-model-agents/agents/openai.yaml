interface:
  display_name: "AI Agent Swarm"
  short_description: "AI Agent Swarm V1.4.6：Codex 主控，Opus 主编码，Gemini 测试分析，工程闸门和本地项目记忆库。"
  default_prompt: "使用 $multi-model-agents / AI Agent Swarm V1.4.6 协调 Opus 主编码、Gemini 测试分析、Codex 审查、工程闸门、本地项目记忆库（轻量 RAG）、MCP 可见进度/日志和 patch/edit 局部编辑。"
  icon_small: "./assets/ai-agent-swarm-icon.png"
  icon_large: "./assets/ai-agent-swarm-icon.png"
  brand_color: "#38BDF8"

dependencies:
  tools:
    - type: "mcp"
      value: "multi-model-agents"
      description: "用于调用外部模型角色、执行授权编码、检索和写入本地项目记忆库（轻量 RAG）的 MCP 工具。"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
