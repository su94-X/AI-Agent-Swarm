  short_description: "AI Agent Swarm Lite 1.5.1-lite.1：Codex 主控，Opus/Claude 外部审查与评分，官方 Custom Agents，无 Gemini tester。"
  default_prompt: "使用 $multi-model-agents / AI Agent Swarm Lite 1.5.1-lite.1：优先查看 docs/START_PROMPT.md；Codex 主控，Opus/Claude 只做外部审查与评分，真实测试和最终决策由 Codex 完成。创建 opus-reviewer 时必须要求其调用 reviewer/scorer MCP 工具，不得自己代替 Opus/Claude。"
  icon_small: "./assets/ai-agent-swarm-icon.png"
  icon_large: "./assets/ai-agent-swarm-icon.png"
